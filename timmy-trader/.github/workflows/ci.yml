name: Timmy CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Source
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python modules
        run: python -m compileall trend_trader tests scripts

      - name: Run tests
        run: pytest

      - name: Run smoke test
        run: PYTHONPATH=. python scripts/smoke_test.py

      - name: Check source-only package boundary
        run: |
          forbidden='(^|/)(\.env$|\.venv/|__pycache__/|build/|dist/|\.pytest_cache/|.*\.egg-info/|timmy-crash\.log$|trade-journal\.jsonl$|execution-events\.jsonl$|paper-training-summary\.json$|\.timmy-audit-key$|timmy\.lock$|timmy-ui-settings\.json$|timmy-watchlist-universe\.txt$|timmy-watchlist-rotation\.json$|active-watchlist|movement-watchlist|trade-ready-watchlist|quiet-watchlist|webull_.*sdk\.log$)'
          if git ls-files | grep -E "$forbidden"; then
            echo "Runtime, generated, or secret-bearing files are tracked."
            exit 1
          fi
